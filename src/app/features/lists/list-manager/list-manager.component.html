<div class="library-container">
  <div class="library-header">
    <div class="header-content">
      <h1 class="page-title">my library</h1>
      <p class="page-subtitle">curate your personal collections</p>
    </div>
  </div>
  
  <div class="create-list-section" #createSection>
    <form (ngSubmit)="addList()" class="create-list-form">
      <div class="form-group">
        <input
          [(ngModel)]="newListTitle"
          name="newListTitle"
          type="text"
          placeholder="collection name"
          required
          #titleInput
          class="sleek-input"
        />
      </div>
      <div class="form-group">
        <input
          [(ngModel)]="newListId"
          name="newListId"
          type="text"
          placeholder="custom id (optional)"
          class="sleek-input"
        />
      </div>
      <button type="submit" class="btn-create">
        <i class="fas fa-plus"></i>
        create collection
      </button>
    </form>
    <p class="form-feedback" *ngIf="statusMessage">{{ statusMessage }}</p>
  </div>

  <div class="collections-grid">
    <div *ngFor="let list of lists" class="collection-card" [routerLink]="['/list', list.id]">
      <div class="collection-preview">
        <div class="preview-stack">
          <ng-container *ngFor="let movieId of getListMovieIds(list).slice(0, 3); let i = index">
            <img 
              [src]="getMoviePoster(movieId)" 
              [alt]="'Movie poster'" 
              class="preview-poster"
              [style.z-index]="3 - i"
              [style.transform]="'translateX(' + (i * 20) + 'px) rotate(' + (i * 2 - 2) + 'deg)'"
            />
          </ng-container>
          <div *ngIf="getListMovieIds(list).length > 3" class="more-count">
            <span>+{{ getListMovieIds(list).length - 3 }}</span>
          </div>
          <div *ngIf="getListMovieIds(list).length === 0" class="empty-preview">
            <i class="fas fa-film"></i>
            <span>empty collection</span>
          </div>
        </div>
        <div class="collection-overlay">
          <div class="view-btn">
            <i class="fas fa-arrow-right"></i>
          </div>
        </div>
      </div>
      
      <div class="collection-info">
        <h3 class="collection-title">{{ list.title }}</h3>
        <div class="collection-meta">
          <span class="item-count">
            <i class="fas fa-film"></i>
            {{ getListMovieIds(list).length }} {{ getListMovieIds(list).length === 1 ? 'item' : 'items' }}
          </span>
          <button class="btn-delete-mini" type="button" title="Delete collection" (click)="deleteList(list.id); $event.stopPropagation()">
            <i class="fas fa-trash"></i>
          </button>
        </div>
      </div>
    </div>
    
    <!-- Add New Collection Card -->
    <div class="collection-card add-new-card" role="button" tabindex="0" (click)="focusCreateForm()" (keydown.enter)="focusCreateForm()" (keydown.space)="focusCreateForm()">
      <div class="add-new-content">
        <i class="fas fa-plus-circle"></i>
        <span>create new collection</span>
      </div>
    </div>
  </div>
</div>
